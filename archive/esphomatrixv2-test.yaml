substitutions:
  devicename: ehmtx8266
  matrix_pin: GPIO02

esphome:
  name: $devicename
  friendly_name: LED Matrix
  comment: 8x8 RGB EspHoMaTriX TEST

external_components:
  - source: github://lubeda/EspHoMaTriXv2
    refresh: 60s 
    components: [ ehmtxv2 ]   
  
