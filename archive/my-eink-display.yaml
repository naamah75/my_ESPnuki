graph:
  - id: multi_graph
    duration: 12h
    x_grid: 10min
    y_grid: 1.0
    max_value: 100
    min_value: 0
    width: 920
    height: 460
    border: True
    traces:
      - sensor: kw_daily_out_perc
        line_type: SOLID
        line_thickness: 5
      - sensor: cloud_perc
        line_type: DOTTED
        line_thickness: 3
      - sensor: sun_perc
        line_type: DASHED
        line_thickness: 3     

display:
  - platform: t547
    id: t5_display
    rotation: 0
    update_interval: 10min
    lambda: |-
      #define yres 540 
      #define xres 960
      #define x_pad 5 // border padding
      #define y_pad 5 // border padding      
      #define x_orig 20
      #define y_orig 50
      
      it.graph(x_orig, y_orig, id(multi_graph));

      int y = 0;
      it.printf(x_orig+10, y_orig+30, id(font_value), TextAlign::BASELINE_LEFT, "Sun %.1f°", id(sun_elevation).state);
      it.printf(x_orig+10, y_orig+60, id(font_value), TextAlign::BASELINE_LEFT, "Clo %.1f%%", id(cloud_perc).state);
      it.printf(x_orig+10, y_orig+90, id(font_value), TextAlign::BASELINE_LEFT, "Pow %.0fw", id(kw_daily_out).state);
      it.print(xres/2, y+y_pad-10, id(font_name_2), TextAlign::TOP_CENTER, generateDateFormat(id(ntp).now()).c_str());
      it.strftime(x_pad, yres-y_pad/2, id(font_footer), TextAlign::BASELINE_LEFT, "Aggiornato: %H:%M", id(ntp).now());
      it.printf(xres-x_pad, yres-y_pad/2, id(font_footer), TextAlign::BASELINE_RIGHT, "%.2fV/%.0f%%", id(batt_volt).state, id(batt).state);
