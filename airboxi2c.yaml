substitutions:
  devicename: airboxi2c

esphome:
  name: ${devicename}
  friendly_name: Airbox (i2c)
  libraries:
    - Wire
    - SPI
  platformio_options:
    lib_deps:
      - https://github.com/wemos/LOLIN_HP303B_Library.git
    lib_ldf_mode: chain+


external_components:
  - source: github://shish/esphome-projects
    components:
      - hp303b

esp8266:
  board: d1_mini

logger:

api:
  encryption:
    key: Kx3R+QkuRMa1+1mExxux1VQ+kGZwoxLmufDWDNqvu1U=

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password_2
  ap:
    ssid: ${devicename} Fallback Hotspot
    password: yK4Nia32K90Z

ota:
  - platform: esphome
    password: 04c0bbd516c5b4e7cd88fa933dc6b8f6

captive_portal:

web_server:
  local: true

i2c:
  sda: 4
  scl: 5
  scan: true

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ${devicename} IP address
      icon: mdi:access-point-network
    ssid:
      name: ${devicename} SSID
      icon: mdi:access-point-network
    bssid:
      name: ${devicename} BSSID
      icon: mdi:access-point-network
    mac_address:
      name: ${devicename} MAC address
      icon: mdi:chip

sensor:
  - platform: wifi_signal
    name: ${devicename} WiFi Signal
    id: wifi_signal_db
    entity_category: diagnostic
    device_class: signal_strength
    icon: mdi:wifi
    update_interval: 60s

  - platform: uptime
    name: ${devicename} Uptime
    icon: mdi:clock
    device_class: duration
    update_interval: 60s

  - platform: sht3xd
    temperature:
      name: SHT30 Temperature
      id: temp
      filters:
        - offset: -5.6
    humidity:
      name: SHT30 Humidity
      id: humy
    address: 0x45
    update_interval: 60s

  - platform: sgp30
    eco2:
      name: SGP30 eCO2
      accuracy_decimals: 1
      id: eco2
    tvoc:
      name: SGP30 TVOC
      accuracy_decimals: 1
      id: tvoc
    address: 0x58
    compensation:
      temperature_source: temp
      humidity_source: humy
    store_baseline: false
    baseline:
      eco2_baseline: 36958
      tvoc_baseline: 38679
    update_interval: 60s

  - platform: hp303b
    temperature:
      name: HP303B Temperature
    pressure:
      name: HP303B Pressure
      id: press
    address: 0x77
    update_interval: 60s

switch:
  - platform: restart
    name: ${devicename} restart
    device_class: switch
    entity_category: diagnostic
