substitutions:
  devicename: led-strip-sala
  leds: '108'

esphome:
  name: ${devicename}
  friendly_name: LED sala
  on_boot:
    then:
      - light.turn_on:
          id: light_1
          brightness: 25%

esp8266:
  board: d1_mini
  restore_from_flash: true

logger:

api:

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password_2
  ap:
    ssid: ${devicename} Fallback Hotspot
    password: yK4Nia32K90Z

ota:
  - platform: esphome
    password: "6d2982ede5a47e6eb692fb29ea19b5e0"

web_server:
  local: false
  version: 3

text_sensor:
- platform: wifi_info
  ip_address:
    name: ${devicename} IP address
    icon: mdi:access-point-network
  ssid:
    name: ${devicename} SSID
    icon: mdi:access-point-network
  bssid:
    name: ${devicename} BSSID
    icon: mdi:access-point-network
  mac_address:
    name: ${devicename} MAC address
    icon: mdi:chip
    
sensor:
- platform: wifi_signal
  name: ${devicename} WiFi Signal
  id: wifi_signal_db
  entity_category: diagnostic
  device_class: signal_strength
  icon: mdi:wifi
  update_interval: 60s
- platform: uptime
  name: ${devicename} Uptime
  icon: mdi:clock
  device_class: duration
  update_interval: 60s

light:
  - platform: neopixelbus
    restore_mode: RESTORE_DEFAULT_ON
    variant: WS2811
    pin: D4
    num_leds: ${leds}
    type: GRB
    name: NeoPixel WS2812
    icon: mdi:led-strip-variant
    id: light_1
    effects:
      - strobe:
      - flicker:
      - addressable_rainbow:
      - addressable_color_wipe:
      - addressable_scan:
      - addressable_twinkle:
      - addressable_random_twinkle:
      - addressable_fireworks: