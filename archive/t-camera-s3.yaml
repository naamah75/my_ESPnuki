substitutions:
  devicename: t-camera-s3
  friendly_name: T-Camera S3

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 600
    then:
      - lambda: |-
          time_t now = id(current_time).now().timestamp;
          char buffer[30];
          strftime(buffer, sizeof(buffer), "%Y-%m-%d %H:%M:%S", localtime(&now));
          id(startup_time).publish_state(buffer);
  libraries:
    - XPowersLib=https://github.com/lewisxhe/XPowersLib.git
    - "Wire"
  includes:
    - AXP2101_component.h

external_components:
  - source:
      type: git
      url: https://github.com/robertklep/esphome-custom-component
    components: [ custom, custom_component ]

custom_component:
  - lambda: |-
      auto axp2101 = new AXP2101Component();
      return {axp2101};
    components:
      - id: axp2101

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino
  variant: esp32s3
  flash_size: 16MB

logger:
  level: INFO

debug:
  update_interval: 60s

api:
  encryption:
    key: "9vXvJw8P1m55DoX4XOc281/xBX+5GPqPs2G12Bca1E0="

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password_2
  ap:
    ssid: ${devicename} Fallback Hotspot
    password: yK4Nia32K90Z

ota:
  platform: esphome
  password: "6decea44a5f092e07875e54519cdd83e"

captive_portal:

time:
  - platform: sntp
    id: current_time
    timezone: Europe/Rome

esp32_camera_web_server:
  - port: 8080
    mode: stream

i2c:
  - id: bus_a
    sda: GPIO7
    scl: GPIO6
  - id: bus_b
    sda: GPIO5
    scl: GPIO4   

psram:
  mode: octal
  speed: 80MHz

font:
  - file: "gfonts://Roboto Condensed"
    id: font_Silkscreen
    size: 18

  - file: "gfonts://Silkscreen"
    id: font_VT323
    size: 24

globals:
  - id: show_logo
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: display_enabled
    type: bool
    restore_value: no
    initial_value: 'false'

script:
  - id: show_display_for_60s
    mode: restart
    then:
      - lambda: |-
          id(display_enabled) = true;
      - delay: 60s
      - lambda: |-
          id(display_enabled) = false;

image:
  - file: "images/esphome_logo.bmp"
    id: esphome_logo
    type: BINARY
    resize: 128x64

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    i2c_id: bus_a
    rotation: 180°
    lambda: |-
      if (id(show_logo)) {
        it.image(0, 0, id(esphome_logo));
        return;
      }

      if (!id(display_enabled)) {
        it.clear();
        return;
      }

      const int width = 128;

      it.printf(0, 0, id(font_VT323), "ESPHome");

      std::string ip = id(esp_ip_address).state;
      int x1, y1, w, h;
      it.get_text_bounds(0, 0, ip.c_str(), id(font_Silkscreen), TextAlign::TOP_LEFT, &x1, &y1, &w, &h);
      it.printf((width - w) / 2, 28, id(font_Silkscreen), "%s", ip.c_str());

      char timebuf[16];
      time_t ts = id(current_time).now().timestamp;
      strftime(timebuf, sizeof(timebuf), "%H:%M:%S", localtime(&ts));
      it.get_text_bounds(0, 0, timebuf, id(font_Silkscreen), TextAlign::TOP_LEFT, &x1, &y1, &w, &h);
      it.printf((width - w) / 2, 44, id(font_Silkscreen), "%s", timebuf);


esp32_camera:
  name: ${devicename} OV2640
  id: espcam
  external_clock:
    pin: GPIO38
    frequency: 20MHz
  i2c_id: bus_b
  data_pins: [GPIO14, GPIO47, GPIO48, GPIO21, GPIO13, GPIO11, GPIO10, GPIO09]
  vsync_pin: GPIO8
  href_pin: GPIO18
  pixel_clock_pin: GPIO12
  reset_pin: GPIO39
  resolution: SVGA
  jpeg_quality: 20
  max_framerate: 3 fps
  frame_buffer_count: 1
  brightness: 2
  aec_mode: AUTO
  aec_value: 600  # aec_mode: MANUAL
  ae_level : 2    # aec_mode: AUTO
  agc_mode: AUTO
  agc_value: 10           # agc_mode: MANUAL
  agc_gain_ceiling: 32X    # agc_mode: AUTO
  wb_mode: AUTO

binary_sensor:
  - platform: gpio
    pin: GPIO17
    name: ${devicename} PIR Motion
    device_class: motion
    id: pir_motion
    on_press:
      - script.execute: show_display_for_60s
  - platform: status
    name: ${devicename} Status
    device_class: connectivity
    entity_category: diagnostic
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
    name: ${devicename} Boot Button
    entity_category: diagnostic
    filters:
      - invert:
    on_press:
      - logger.log: "Pulsante premuto!"

switch:
  - platform: restart
    name: ${devicename} Restart
    device_class: switch
    entity_category: diagnostic

sensor:
  - platform: wifi_signal
    name: ${devicename} WiFi Signal
    id: wifi_signal_db
    entity_category: diagnostic
    device_class: signal_strength
    icon: mdi:wifi
  - platform: uptime
    name: ${devicename} Uptime
    icon: mdi:clock
    device_class: duration
  - platform: debug
    free:
      name: ${devicename} Heap Free
      entity_category: diagnostic
      device_class: data_size
      icon: mdi:bug
    block:
      name: ${devicename} Heap Max Block
      entity_category: diagnostic
      device_class: data_size
      icon: mdi:bug
    loop_time:
      name: ${devicename} Loop Time
      entity_category: diagnostic
      device_class: duration
      icon: mdi:bug
    psram:
      name: ${devicename} Free PSRAM
      entity_category: diagnostic
      device_class: data_size
      icon: mdi:bug

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ${devicename} IP address
      id: esp_ip_address
      icon: mdi:network
      entity_category: diagnostic
      on_value:
        then:
          - lambda: |-
              id(show_logo) = false;
    ssid:
      name: ${devicename} SSID
      icon: mdi:wifi
      entity_category: diagnostic
    bssid:
      name: ${devicename} BSSID
      icon: mdi:wifi
      entity_category: diagnostic
    mac_address:
      name: ${devicename} MAC address
      icon: mdi:chip
      entity_category: diagnostic

  - platform: template
    name: ${devicename} boot time
    id: startup_time
    icon: mdi:calendar-clock
    update_interval: never
    lambda: |-
      time_t now = id(current_time).now().timestamp;
      char buffer[30];
      strftime(buffer, sizeof(buffer), "%Y-%m-%d %H:%M:%S", localtime(&now));
      return std::string(buffer);
    entity_category: diagnostic