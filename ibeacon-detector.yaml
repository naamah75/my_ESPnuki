substitutions:
  pulse_gpio: "46"
  default_pulse_time: "2s"
  delayed_off_time: "3s"
  delayed_on_time: "0s"
  interlock_time: "120"
  max_relay_on_time: "30"
  mac1: "C6:EE:11:FC:AA:F8"   # Cristina
  rssi_threshold_mac1: "-55"
  mac2: "C6:AF:63:AF:41:55"   # Igor
  rssi_threshold_mac2: "-55"
  mac3: "CF:A9:12:69:2C:77"   # Neith
  rssi_threshold_mac3: "-65"
  mac4: "DA:7A:BC:2C:CD:17"   # Amon
  rssi_threshold_mac4: "-65"
  mac5: "B1:C2:D3:E4:F5:06"
  rssi_threshold_mac5: "-65"
  mac6: "C1:D2:E3:F4:05:16"
  rssi_threshold_mac6: "-65"
  devicename: ibeacon-detector

esphome:
  name: ${devicename}
  friendly_name: iBeacon detector
  on_boot:
    priority: 600
    then:
      - lambda: |-
          time_t now = id(sntp_time).now().timestamp;
          char buffer[30];
          strftime(buffer, sizeof(buffer), "%Y-%m-%d %H:%M:%S", localtime(&now));
          id(startup_time).publish_state(buffer);

