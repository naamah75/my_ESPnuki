substitutions:
  devicename: led-kitchen-2
  leds: 59
  supply_voltage: 5.0

esphome:
  name: ${devicename}
  friendly_name: LED cucina 2

esp8266:
  board: d1_mini
  restore_from_flash: true

logger:

api:
  encryption:
    key: "zUln3/yDdAgc6RMOJ20tKqvZvS788iR1ZnYFJFzJH+g="

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password_2
  ap:
    ssid: ${devicename} Fallback Hotspot
    password: yK4Nia32K90Z

ota:
  - platform: esphome
    password: "74de27713c7d0010d2f1cca720d0d76c"

captive_portal:

web_server:
  local: true
  version: 3

globals:
  - id: led_ma_per_channel
    type: float
    restore_value: no
    initial_value: "20.0"
  - id: idle_ma_per_led
    type: float
    restore_value: no
    initial_value: "0.8"
  - id: overhead_factor
    type: float
    restore_value: no
    initial_value: "1.10"

light:
  - platform: neopixelbus
    restore_mode: RESTORE_DEFAULT_ON
    variant: WS2812
    pin: D4
    num_leds: ${leds}
    type: GRB
    name: NeoPixel WS2812
    id: light1
    icon: mdi:led-strip-variant
    effects:
      - strobe:
      - flicker:
      - addressable_rainbow:
      - addressable_color_wipe:
      - addressable_scan:
      - addressable_twinkle:
      - addressable_random_twinkle:
      - addressable_fireworks:

text_sensor:
- platform: wifi_info
  ip_address:
    name: ${devicename} IP address
    icon: mdi:access-point-network
  ssid:
    name: ${devicename} SSID
    icon: mdi:access-point-network
  bssid:
    name: ${devicename} BSSID
    icon: mdi:access-point-network
  mac_address:
    name: ${devicename} MAC address
    icon: mdi:chip

sensor:
- platform: wifi_signal
  name: ${devicename} WiFi Signal
  id: wifi_signal_db
  entity_category: diagnostic
  device_class: signal_strength
  icon: mdi:wifi
  update_interval: 60s
- platform: uptime
  name: ${devicename} Uptime
  icon: mdi:clock
  device_class: duration
  update_interval: 60s
- platform: template
  id: led_est_current
  name: "Corrente stimata"
  unit_of_measurement: "A"
  device_class: current
  accuracy_decimals: 2
  update_interval: 10s
  lambda: |-
    using esphome::light::LightColorValues;
    auto &cv = id(light1).current_values;

    float b  = cv.get_brightness();   // 0..1
    float r  = cv.get_red()   * b;
    float g  = cv.get_green() * b;
    float bl = cv.get_blue()  * b;

    const float channels_sum = r + g + bl; // 0..3
    const float ma_per_led   = channels_sum * id(led_ma_per_channel) + id(idle_ma_per_led);
    const float total_ma     = (${leds} * ma_per_led) * id(overhead_factor);

    return total_ma / 1000.0f; // Ampere

- platform: template
  name: "LED Potenza stimata"
  unit_of_measurement: "W"
  device_class: power
  accuracy_decimals: 1
  update_interval: 60s
  lambda: |-
    return id(led_est_current).state * ${supply_voltage};   

number:
  - platform: template
    name: "mA per canale"
    min_value: 10
    max_value: 25
    step: 0.5
    optimistic: true
    initial_value: 20
    set_action:
      then:
        - lambda: |-
            id(led_ma_per_channel) = x;
  - platform: template
    name: "mA idle per LED"
    min_value: 0.1
    max_value: 2
    step: 0.1
    optimistic: true
    initial_value: 0.8
    set_action:
      then:
        - lambda: |-
            id(idle_ma_per_led) = x;
  - platform: template
    name: "Overhead factor"
    min_value: 1.00
    max_value: 1.30
    step: 0.01
    optimistic: true
    initial_value: 1.10
    set_action:
      then:
        - lambda: |-
            id(overhead_factor) = x;