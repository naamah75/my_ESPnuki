substitutions:
  devicename: airbox-cucina

esphome:
  name: ${devicename}
  friendly_name: Airbox (cucina)

esp8266:
  board: d1_mini_pro

logger: null

api:
  encryption:
    key: deFNX+zsmPvapZ32LyOEW9o0I1K8wHI1hmgdatxnejE=

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password_2
  ap:
    ssid: ${devicename} Fallback Hotspot
    password: yK4Nia32K90Z

ota:
- platform: esphome
  password: 501cd7aee49b3a35c5699afd82392dd6

captive_portal: null

web_server:
  local: true

i2c:
  sda: 4
  scl: 5
  scan: true

text_sensor:
- platform: wifi_info
  ip_address:
    name: ${devicename} IP address
    icon: mdi:access-point-network
  ssid:
    name: ${devicename} SSID
    icon: mdi:access-point-network
  bssid:
    name: ${devicename} BSSID
    icon: mdi:access-point-network
  mac_address:
    name: ${devicename} MAC address
    icon: mdi:chip

sensor:
- platform: wifi_signal
  name: ${devicename} WiFi Signal
  id: wifi_signal_db
  entity_category: diagnostic
  device_class: signal_strength
  icon: mdi:wifi
  update_interval: 60s
- platform: uptime
  name: ${devicename} Uptime
  icon: mdi:clock
  device_class: duration
  update_interval: 60s
- platform: sht3xd
  temperature:
    name: SHT30 Temperature
    id: temp
  humidity:
    name: SHT30 Humidity
    id: humy
  address: 69
  update_interval: 60s
- platform: sgp30
  eco2:
    name: SGP30 eCO2
    accuracy_decimals: 1
    id: eco2
  tvoc:
    name: SGP30 TVOC
    accuracy_decimals: 1
    id: tvoc
  address: 88
  compensation:
    temperature_source: temp
    humidity_source: humy
  update_interval: 60s
- platform: bh1750
  name: ${devicename} Illuminance
  address: 35
  update_interval: 60s
  id: illu
  filters:
  - delta: 10%

switch:
  - platform: restart
    name: ${devicename} restart
    device_class: switch
    entity_category: diagnostic    