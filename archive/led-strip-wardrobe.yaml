substitutions:
  devicename: led-strip-wardrobe
  leds: '30'

esphome:
  name: ${devicename}
  friendly_name: LED armadio

esp8266:
  board: d1_mini
  restore_from_flash: true

logger: null

api:
  encryption:
    key: 8WAAKJ/+uoh1pS6WxJmk4CY3Im6m/IplKpSClM0QUDw=

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password_2
  ap:
    ssid: ${devicename} Fb Hs
    password: yK4Nia32K90Z

ota:
- platform: esphome
  password: 583714120bc2cbecae41ef230133b3f3

captive_portal: null

web_server:
  local: true
  version: 3

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true

text_sensor:
- platform: wifi_info
  ip_address:
    name: ${devicename} IP address
    icon: mdi:access-point-network
  ssid:
    name: ${devicename} SSID
    icon: mdi:access-point-network
  bssid:
    name: ${devicename} BSSID
    icon: mdi:access-point-network
  mac_address:
    name: ${devicename} MAC address
    icon: mdi:chip

sensor:
- platform: wifi_signal
  name: ${devicename} WiFi Signal
  id: wifi_signal_db
  entity_category: diagnostic
  device_class: signal_strength
  icon: mdi:wifi
  update_interval: 60s
- platform: uptime
  name: ${devicename} Uptime
  icon: mdi:clock
  device_class: duration
  entity_category: diagnostic
- platform: tsl2561
  name: TSL2561
  address: 41
  update_interval: 1s
  device_class: illuminance

light:
- platform: neopixelbus
  restore_mode: RESTORE_DEFAULT_OFF
  variant: WS2812
  pin: D7
  num_leds: ${leds}
  type: GRB
  name: NeoPixel WS2812
  id: light1
  icon: mdi:led-strip-variant
  effects:
  - strobe: null
  - flicker: null
  - addressable_rainbow: null
  - addressable_color_wipe: null
  - addressable_scan: null
  - addressable_twinkle: null
  - addressable_random_twinkle: null
  - addressable_fireworks: null