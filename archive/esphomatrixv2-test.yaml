esp8266:
  board: d1_mini_pro

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "mex2hV6RlEB9qrNy2uoqUxDo4tNX4RsPDU/rlaxnKEs="

ota:
  - platform: esphome
    password: "14bacb38cc729f32a4f935339f906c31"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esphomatrixv2-Test"
    password: "DOnWqo6JPJ5V"

captive_portal:

light:
  - platform: neopixelbus
    variant: WS2812
    type: GRB
    pin: GPIO4  
    num_leds: 64
    id: matrix_light

font:
  - file: "fonts/minecraftia.ttf"
    id: matrix_font
    size: 8

time:
  - platform: homeassistant
    id: matrix_time

display:
  - platform: addressable_light
    id: matrix_display
    addressable_light_id: matrix_light
    width: 8
    height: 8
    pixel_mapper: |-
      if (y % 2 == 0) {
        return (y * 8) + x;
      }
      return (y * 8) + (7 - x);
    lambda: |-
      it.fill(COLOR_OFF);
      it.print(0, 0, id(matrix_font), COLOR_ON, "A");

