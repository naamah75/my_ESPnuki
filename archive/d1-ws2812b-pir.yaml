esphome:
  name: d1-ws2812b-pir
  platform: ESP8266
  board: d1_mini_pro

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password_2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "D1 Ws2812B Pir Fallback Hotspot"
    password: "Gf2ZCfqc6jgb"

captive_portal:

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:

web_server:
  local: true

binary_sensor:
  - platform: gpio
    pin: D3
    name: "PIR Sensor"
    device_class: motion

light:
  - platform: neopixelbus
    variant: WS2812
    pin: D2
    num_leds: 1
    type: GRB
    name: "FastLED WS2811 Light"