esphome:
  name: rain-sensor
  friendly_name: Rain Sensor

esp8266:
  board: d1_mini

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "VnGYBWJzSTpAj8GXDClV0n9iC5c9oMwGNlnAaoJv8f0="

ota:
  platform: esphome
  password: "4dab0b4d69abdea059639375ba7368e0"

wifi:
  networks:
  - ssid: !secret wifi_ssid
    password: !secret wifi_password
  - ssid: !secret wifi_ssid_2
    password: !secret wifi_password_2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Rain-Sensor Fallback Hotspot"
    password: "59kzRIPRUbR8"

captive_portal:
    
web_server:
  port: 80

i2c:
  sda: 4
  scl: 5
  scan: true

binary_sensor:
  - platform: gpio
    pin: D0
    name: "Rain Sensor"
    id: boolean_rain_sensor
    device_class: moisture
    filters:
      - invert
      - delayed_on: 3s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP address
      icon: mdi:access-point-network
    ssid:
      name: SSID
      icon: mdi:access-point-network
    bssid:
      name: BSSID
      icon: mdi:access-point-network
    mac_address:
      name: MAC address
      icon: mdi:chip

sensor:
  - platform: wifi_signal
    name: WiFi signal
    id: wifi_signal_db
    entity_category: "diagnostic"
    device_class: signal_strength
    icon: mdi:wifi
  - platform: uptime
    name: Uptime    
    icon: mdi:clock
    device_class: duration
  - platform: wifi_signal
    name: "WiFi Signal"
    icon: mdi:wifi
    update_interval: 60s
  - platform: adc
    pin: A0
    name: "Rain Sensor"
    id: analog_rain_sensor
    device_class: moisture
    filters: 
      - delta: 5%    