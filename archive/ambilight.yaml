esphome:
  name: ambilight
  friendly_name: ambilight

esp8266:
  board: d1_mini
  restore_from_flash: true	

substitutions:
  devicename: 'Ambilight'
  leds: '30'

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "NQV38POpoR2G9krwh/uIH3mgtnyvcEd3aqaf3Gf1iJo="

ota:
  password: "e3db3529b1d28ebb351b42411945236d"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Ambilight Fallback Hotspot"
    password: "DuT6qtC0XFGJ"

captive_portal:

web_server:
  local: true
  version: 3

light:
  - platform: neopixelbus
    restore_mode: RESTORE_DEFAULT_OFF 
    variant: WS2812
    pin: D4
    num_leds: ${leds}
    type: GRB
    name: "NeoPixel WS2812 ${devicename}"
    id: light1
    icon: mdi:led-strip-variant
    effects:
      - strobe:
      - flicker:
      - addressable_rainbow:
      - addressable_color_wipe:
      - addressable_scan:
      - addressable_twinkle:
      - addressable_random_twinkle:
      - addressable_fireworks:

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP address ${devicename}"
      icon: mdi:access-point-network
    ssid:
      name: "SSID ${devicename}"
      icon: mdi:access-point-network
    bssid:
      name: "BSSID ${devicename}"
      icon: mdi:access-point-network
    mac_address:
      name: "MAC address l${devicename}"
      icon: mdi:chip

sensor:
  - platform: wifi_signal
    name: "WiFi signal ${devicename}"
    id: wifi_signal_db
    entity_category: "diagnostic"
    device_class: signal_strength
    icon: mdi:wifi
  - platform: uptime
    name: "Uptime ${devicename}"
    icon: mdi:clock
    device_class: duration