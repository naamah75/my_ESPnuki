substitutions:
  devicename: airbox

esphome:
  name: ${devicename}
  friendly_name: Airbox (cameretta)

esp8266:
  board: d1_mini_lite

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password_2
  ap:
    ssid: ${devicename} Fallback Hotspot
    password: yK4Nia32K90Z

captive_portal: null

logger:
  level: DEBUG

api: null

ota:
- platform: esphome

web_server:
  local: true
  version: 3

i2c:
  sda: 4
  scl: 5
  scan: true

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  miso_pin: GPIO12

text_sensor:
- platform: wifi_info
  ip_address:
    name: ${devicename} IP address
    icon: mdi:wifi
    entity_category: diagnostic
  ssid:
    name: ${devicename} SSID
    icon: mdi:wifi
    entity_category: diagnostic
  bssid:
    name: ${devicename} BSSID
    icon: mdi:wifi
    entity_category: diagnostic
  mac_address:
    name: ${devicename} MAC address
    icon: mdi:chip
    entity_category: diagnostic

sensor:
- platform: wifi_signal
  name: ${devicename} WiFi Signal
  id: wifi_signal_db
  entity_category: diagnostic
  device_class: signal_strength
  icon: mdi:wifi
  update_interval: 60s
- platform: uptime
  name: ${devicename} Uptime
  icon: mdi:clock
  device_class: duration
  update_interval: 60s
- platform: sht3xd
  temperature:
    name: SHT30 Temperature
    id: temp
    filters:
    - offset: -5.6
    device_class: temperature
  humidity:
    name: SHT30 Humidity
    id: humy
    device_class: humidity
  address: 69
  update_interval: 60s
- platform: sgp30
  eco2:
    name: SGP30 eCO2
    accuracy_decimals: 1
    id: eco2
  tvoc:
    name: SGP30 TVOC
    accuracy_decimals: 1
    id: tvoc
  address: 88
  compensation:
    temperature_source: temp
    humidity_source: humy
  store_baseline: false
  baseline:
    eco2_baseline: 39895
    tvoc_baseline: 43951
  update_interval: 60s
- platform: bh1750
  name: Illuminance
  address: 35
  update_interval: 1s
  id: illu
  filters:
  - delta: 5%
  device_class: illuminance

switch:
  - platform: restart
    name: ${devicename} restart
    device_class: switch
    entity_category: diagnostic  