esphome:
  name: ds18b20
  friendly_name: DS18B20

esp8266:
  board: d1_mini

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "kCDskBzGqN6PGeJ4xwDCmrN57BMhtRtul+aarAZDC+U="

ota:
  password: "74795e85783d5d8fb490e3b16a159037"

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password_2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Ds18B20 Fallback Hotspot"
    password: "kgK066hxgcgH"

captive_portal:

web_server:
  local: true

i2c:
  sda: 4
  scl: 5
  scan: true

dallas:
  - pin: D3

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ESP IP Address
      icon: mdi:wifi
    ssid:
      name: ESP Connected SSID
      icon: mdi:wifi
    bssid:
      name: ESP Connected BSSID
      icon: mdi:wifi
    mac_address:
      name: ESP Mac Wifi Address
      icon: mdi:chip

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    icon: mdi:wifi
    update_interval: 60s 
  - platform: dallas
    address: 0x860301a279680e28
    name: "Temperature #1"
  - platform: dallas
    address: 0x060301a279c61328
    name: "Temperature #2"    