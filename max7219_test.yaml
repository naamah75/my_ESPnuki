substitutions:
  devicename: max7219_test

esphome:
  name: ${devicename}
  friendly_name: MAX7219 display

esp8266:
  board: d1_mini

captive_portal: null

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password_2
  ap:
    ssid: ${devicename} Fallback Hotspot
    password: yK4Nia32K90Z

logger: null

api: null

ota:
- platform: esphome

web_server:
  local: true

text_sensor:
- platform: wifi_info
  ip_address:
    name: ${devicename} IP address
    icon: mdi:access-point-network
  ssid:
    name: ${devicename} SSID
    icon: mdi:access-point-network
  bssid:
    name: ${devicename} BSSID
    icon: mdi:access-point-network
  mac_address:
    name: ${devicename} MAC address
    icon: mdi:chip
- platform: homeassistant
  id: mytext
  name: mytext
  entity_id: input_text.max7219
  internal: true
- platform: homeassistant
  name: Today Weather Icon
  entity_id: weather.home
  id: weather_icon
  internal: true

sensor:
- platform: wifi_signal
  name: ${devicename} WiFi Signal
  id: wifi_signal_db
  entity_category: diagnostic
  device_class: signal_strength
  icon: mdi:wifi
  update_interval: 60s
- platform: uptime
  name: ${devicename} Uptime
  icon: mdi:clock
  device_class: duration
  update_interval: 60s
- platform: homeassistant
  id: mynumber
  name: mynumber
  entity_id: input_number.max7219_intensity

font:
- file: fonts/thintel.ttf
  id: digit_font
  size: 16

spi:
  clk_pin: D5
  mosi_pin: D7

display:
- platform: max7219digit
  id: my_display
  cs_pin: D6
  num_chips: 4
  intensity: 1
  flip_x: false
  rotate_chip: 180
  reverse_enable: true
  chip_lines_style: snake
  scroll_enable: false
  lambda: it.intensity(id(mynumber).state); it.scroll(false); it.print(it.get_width()/2,
    11, id(digit_font), TextAlign::BOTTOM_CENTER, id(mytext).state.c_str());

switch:
  - platform: restart
    name: ${devicename} restart
    device_class: switch
    entity_category: diagnostic      