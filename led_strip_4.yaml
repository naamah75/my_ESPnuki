substitutions:
  devicename: led_strip_4
  num_leds: 40
  supply_voltage: '5.0'

esphome:
  name: ${devicename}
  friendly_name: LED vaso

esp8266:
  board: d1_mini

captive_portal:

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password_2
  ap:
    ssid: ${devicename} Fallback Hotspot
    password: yK4Nia32K90Z

logger:

api:

ota:
- platform: esphome

web_server:
  local: true

globals:
  - id: led_ma_per_channel
    type: float
    restore_value: no
    initial_value: "20.0"
  - id: idle_ma_per_led
    type: float
    restore_value: no
    initial_value: "0.8"
  - id: overhead_factor
    type: float
    restore_value: no
    initial_value: "1.10"

i2c:
  sda: 4
  scl: 5
  scan: true

# status_led:
#   pin:
#     number: 2
#     inverted: true

light:
- platform: neopixelbus
  id: strip
  name: FastLED WS2813 Light 4  
  pin: 2
  num_leds: ${num_leds}
  type: RGB
  variant: WS2812
  restore_mode: RESTORE_AND_OFF
  color_correct: [100%, 60%, 60%]
  effects:
  - strobe: null
  - flicker: null
  - addressable_rainbow: null
  - addressable_color_wipe: null
  - addressable_scan: null
  - addressable_twinkle: null
  - addressable_random_twinkle: null
  - addressable_fireworks: null
  on_turn_on:
    - light.turn_on:
        id: strip
        brightness: 30%       
        red: 1.0              
        green: 0.5
        blue: 0.1  

text_sensor:
- platform: wifi_info
  ip_address:
    name: ${devicename} IP address
    icon: mdi:access-point-network
  ssid:
    name: ${devicename} SSID
    icon: mdi:access-point-network
  bssid:
    name: ${devicename} BSSID
    icon: mdi:access-point-network
  mac_address:
    name: ${devicename} MAC address
    icon: mdi:chip

sensor:
- platform: wifi_signal
  name: ${devicename} WiFi Signal
  id: wifi_signal_db
  entity_category: diagnostic
  device_class: signal_strength
  icon: mdi:wifi
- platform: uptime
  name: ${devicename} Uptime
  icon: mdi:clock
  device_class: duration
- platform: bh1750
  name: BH1750
  address: 35
  update_interval: 1s
  id: illu
  filters:
  - delta: 10%
- platform: template
  id: led_est_current
  name: ${devicename} corrente stimata
  unit_of_measurement: "A"
  device_class: current
  accuracy_decimals: 2
  update_interval: 10s
  lambda: |-
    if (!id(strip).remote_values.is_on()) {
      return 0.0f;
    }
    auto &cv = id(strip).current_values;
    float b  = cv.get_brightness();   // 0..1
    float r  = cv.get_red()   * b;
    float g  = cv.get_green() * b;
    float bl = cv.get_blue()  * b;
    const float channels_sum = r + g + bl; // 0..3
    const float ma_per_led   = channels_sum * id(led_ma_per_channel) + id(idle_ma_per_led);
    const float total_ma     = (${num_leds} * ma_per_led) * id(overhead_factor);
    return total_ma / 1000.0f; // Ampere
- platform: template
  name: ${devicename} potenza stimata
  unit_of_measurement: "W"
  device_class: power
  accuracy_decimals: 1
  update_interval: 60s
  lambda: |-
    if (!id(strip).remote_values.is_on()) {
      return 0.0f;
    }
    return id(led_est_current).state * ${supply_voltage};  
  
number:
  - platform: template
    name: "mA per canale"
    min_value: 10
    max_value: 25
    step: 0.5
    optimistic: true
    initial_value: 20
    set_action:
      then:
        - lambda: |-
            id(led_ma_per_channel) = x;
  - platform: template
    name: "mA idle per LED"
    min_value: 0.1
    max_value: 2
    step: 0.1
    optimistic: true
    initial_value: 0.8
    set_action:
      then:
        - lambda: |-
            id(idle_ma_per_led) = x;
  - platform: template
    name: "Overhead factor"
    min_value: 1.00
    max_value: 1.30
    step: 0.01
    optimistic: true
    initial_value: 1.10
    set_action:
      then:
        - lambda: |-
            id(overhead_factor) = x;