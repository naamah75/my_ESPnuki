esphome:
  name: ir-remote
  platform: ESP8266
  board: d1_mini

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:
  password: "ff4debc5a452e2ae540a16b0fc10a00a"

wifi:
  ssid: !secret wifi_ssid_2 
  password: !secret wifi_password_2
  
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Ir-Remote Fallback Hotspot"
    password: "eupxY2364EZM"

captive_portal:

web_server:
  port: 80
  include_internal: true 

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ESP IP Address
      icon: mdi:wifi
    ssid:
      name: ESP Connected SSID
      icon: mdi:wifi
    bssid:
      name: ESP Connected BSSID
      icon: mdi:wifi
    mac_address:
      name: ESP Mac Wifi Address
      icon: mdi:chip

i2c:
  sda: GPIO4
  scl: GPIO5

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    icon: mdi:wifi
    update_interval: 60s
  - platform: sht3xd
    temperature:
      name: "Temperatura"
      id: t_sensor
      filters:
        - offset: -1.9
    humidity:
      name: "Umidità"
      id: h_sensor
    address: 0x45
    update_interval: 10s

remote_transmitter:
  pin: GPIO0
  carrier_duty_percent: 50%

remote_receiver:
  id: rcvr
  pin: GPIO2
  #dump: all


climate:
  - platform: coolix
    name: "Sala"
    sensor: t_sensor