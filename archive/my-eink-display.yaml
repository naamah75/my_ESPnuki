button:
  - platform: restart
    name: "${esp_name} Restart"

  - platform: template
    name: "${esp_name} Refresh"
    icon: "mdi:update"
    on_press:
      then:
      - component.update: t5_display

binary_sensor:
  - platform: gpio
    pin: 
      number: GPIO39
      inverted: true
    name: "${esp_name} Button 1"
    on_press:
      then:
       - component.update: t5_display
      
  - platform: gpio
    pin: 
      number: GPIO34
      inverted: true
    name: "${esp_name} Button 2"

  - platform: gpio
    pin: 
      number: GPIO35
      inverted: true
    name: "${esp_name} Button 3"

sensor:
  - platform: homeassistant
    id: sun_elevation
    entity_id: sun.sun
    attribute: elevation

  - platform: sun
    id: esphome_sun_elevation
    type: elevation

  - platform: homeassistant
    entity_id: sensor.openweathermap_cloud_coverage
    id: cloud_perc
    internal: true
    
  - platform: homeassistant
    entity_id: sensor.${instance}owl_intuition_electricity_power
    id: kw_daily
    internal: true

  - platform: homeassistant
    entity_id: sensor.${instance}daily_sensor
    id: kw_daily_in_max
    internal: true

  - platform: homeassistant
    entity_id: sensor.${instance}potenza_generata_massima
    id: kw_daily_out_max
    internal: true

  - platform: homeassistant
    entity_id: sensor.${instance}abb_pout
    id: kw_daily_out
    internal: true
    on_value: # Actions to perform once data for the last sensor has been received
      then:
        - script.execute: all_data_received       

  - platform: adc
    pin: GPIO36
    name: "${esp_name} Battery Voltage"
    id: batt_volt
    attenuation: 11db
    update_interval: 60s
    filters:
      - multiply: 2

  - platform: template
    name: "${esp_name} Battery"
    id: batt
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    lambda: |-
      int y = (1-(4.1-id(batt_volt).state)/(4.1-3.3))*100;
      if (y < 100) {return y;} else {return 100;};
    update_interval: 60s

  - platform: template
    id: kw_daily_out_perc
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: power
    lambda: |-
      int value = id(kw_daily_out).state/3300*100;
      return value;
    update_interval: 60s

  - platform: template
    id: kw_daily_perc
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: power
    lambda: |-
      int value = id(kw_daily).state/3300*100;
      return value;
    update_interval: 60s

  - platform: template
    id: sun_perc
    unit_of_measurement: "%"
    accuracy_decimals: 0
    lambda: |-
      int value = id(esphome_sun_elevation).state/90*100;
      if (value < 0) value = 0;
      return value;
    update_interval: 60s

script:
  - id: all_data_received
    then:
      - component.update: batt_volt
      - component.update: batt
