substitutions:
  devicename: salt-lamp
  leds: '38'

esphome:
  name: ${devicename}
  friendly_name: Lampada di sale

esp8266:
  board: d1_mini
  restore_from_flash: true

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "8DCGi+EIZCwhZI7/AgCjHYmuITaXmCKneJZtOkz3zI0="

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password_2
  ap:
    ssid: ${devicename} Fallback Hotspot
    password: yK4Nia32K90Z
ota:
  platform: esphome
  password: "a5ede1ae55146112bc67ce3b9c796ab5"

captive_portal:

web_server:
  local: true
  version: 3

switch:
  - platform: gpio
    pin:
      number: D4
    id: gpio_d4
    inverted: true
    name: "GPIO D4 ${devicename}"

light:
  - platform: neopixelbus
    restore_mode: RESTORE_AND_OFF
    variant: WS2812
    pin:
      number: D3
    num_leds: ${leds}
    type: GRB
    name: "NeoPixel WS2812 ${devicename}"
    id: light1
    icon: mdi:led-strip-variant
    effects:
      - strobe:
      - flicker:
      - addressable_rainbow:
      - addressable_color_wipe:
      - addressable_scan:
      - addressable_twinkle:
      - addressable_random_twinkle:
      - addressable_fireworks:
    on_turn_on:
    - switch.turn_on: gpio_d4
    on_turn_off:
    - switch.turn_off: gpio_d4

text_sensor:
- platform: wifi_info
  ip_address:
    name: ${devicename} IP address
    icon: mdi:access-point-network
  ssid:
    name: ${devicename} SSID
    icon: mdi:access-point-network
  bssid:
    name: ${devicename} BSSID
    icon: mdi:access-point-network
  mac_address:
    name: ${devicename} MAC address
    icon: mdi:chip

sensor:
- platform: wifi_signal
  name: ${devicename} WiFi Signal
  id: wifi_signal_db
  entity_category: diagnostic
  device_class: signal_strength
  icon: mdi:wifi
  update_interval: 60s
- platform: uptime
  name: ${devicename} Uptime
  icon: mdi:clock
  device_class: duration
  update_interval: 60s