esphome:
  name: wio_link_2
  platform: ESP8266
  board: wio_link

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password_2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Wio Link 2 Fallback Hotspot"
    password: "D4JA0Uux6Up2"

captive_portal:

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:

web_server:
  local: true

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: True

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ESP IP Address
      icon: mdi:wifi
    ssid:
      name: ESP Connected SSID
      icon: mdi:wifi
    bssid:
      name: ESP Connected BSSID
      icon: mdi:wifi
    mac_address:
      name: ESP Mac Wifi Address
      icon: mdi:chip

sensor:
  - platform: wifi_signal
    name: "Wio Node 3 WiFi Signal"
    icon: mdi:wifi
    update_interval: 60s
  - platform: tsl2561
    name: "Wio Link 2 ambient light"
    address: 0x29
    update_interval: 60s    

switch:
  - platform: gpio
    pin:
      number: GPIO15
      inverted: True
      mode: OUTPUT        
    name: "Wio Link 2 led"
    id: red_led

light:
  - platform: neopixelbus
    variant: WS2812
    pin: GPIO14
    num_leds: 30
    type: GRB
    name: "FastLED WS2813 Light Wio Link 2"
    effects:
      - strobe:
      - flicker:
      - addressable_rainbow:
      - addressable_color_wipe:
      - addressable_scan:
      - addressable_twinkle:
      - addressable_random_twinkle:
      - addressable_fireworks: