substitutions:
  devicename: led-cameretta-1
  leds: '131'
  seg1_last: '43'
  seg2_first: '87'
  seg2_last: '130'
  supply_voltage: '5.0'

esphome:
  name: ${devicename}
  friendly_name: LED Cameretta 1

esp8266:
  board: d1_mini

logger:

api:
  encryption:
    key: "VxtL7JC30rl9mz4SoRLamgv/ULwopXxOgs5kRS0lj+o="

ota:
  - platform: esphome
    password: "6e1ed7cb41da4c32fa761b72dae9d439"

wifi:
  ssid: !secret wifi_ssid_24GHz
  password: !secret wifi_password_24GHz
  ap:
    ssid: ${devicename} fallback hotspot
    password: "VGTjZ3gqB9xE"

captive_portal:

web_server:
  local: true
  version: 3

globals:
  - id: led_ma_per_channel
    type: float
    restore_value: no
    initial_value: "20.0"
  - id: idle_ma_per_led
    type: float
    restore_value: no
    initial_value: "0.8"
  - id: overhead_factor
    type: float
    restore_value: no
    initial_value: "1.10"

i2c:
  sda: GPIO13
  scl: GPIO14
  scan: true

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ${devicename} IP address
      icon: mdi:wifi
      entity_category: diagnostic
    ssid:
      name: ${devicename} SSID
      icon: mdi:wifi
      entity_category: diagnostic
    bssid:
      name: ${devicename} BSSID
      icon: mdi:wifi
      entity_category: diagnostic
    mac_address:
      name: ${devicename} MAC address
      icon: mdi:chip
      entity_category: diagnostic

sensor:
  - platform: wifi_signal
    name: ${devicename} WiFi Signal
    id: wifi_signal_db
    entity_category: diagnostic
    device_class: signal_strength
    icon: mdi:wifi

  - platform: uptime
    name: ${devicename} Uptime
    icon: mdi:clock
    device_class: duration

  - platform: template
    id: led_est_current
    name: ${devicename} corrente stimata
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      if (!id(strip).remote_values.is_on()) {
        return 0.0f;
      }
      auto &cv = id(strip).current_values;
      float b  = cv.get_brightness();   // 0..1
      float r  = cv.get_red()   * b;
      float g  = cv.get_green() * b;
      float bl = cv.get_blue()  * b;
      const float channels_sum = r + g + bl; // 0..3
      const float ma_per_led   = channels_sum * id(led_ma_per_channel) + id(idle_ma_per_led);
      const float total_ma     = (${leds} * ma_per_led) * id(overhead_factor);
      return total_ma / 1000.0f; // Ampere

  - platform: template
    name: ${devicename} potenza stimata
    unit_of_measurement: "W"
    device_class: power
    accuracy_decimals: 1
    update_interval: 60s
    lambda: |-
      if (!id(strip).remote_values.is_on()) {
        return 0.0f;
      }
      return id(led_est_current).state * ${supply_voltage};

  - platform: bh1750
    name: ${devicename} luminanza
    address: 35
    update_interval: 1s
    id: illu
    filters:
      - delta: 5%
    device_class: illuminance

number:
  - platform: template
    name: "mA per canale"
    min_value: 10
    max_value: 25
    step: 0.5
    optimistic: true
    initial_value: 20
    set_action:
      then:
        - lambda: |-
            id(led_ma_per_channel) = x;

  - platform: template
    name: "mA idle per LED"
    min_value: 0.1
    max_value: 2
    step: 0.1
    optimistic: true
    initial_value: 0.8
    set_action:
      then:
        - lambda: |-
            id(idle_ma_per_led) = x;

  - platform: template
    name: "Overhead factor"
    min_value: 1.00
    max_value: 1.30
    step: 0.01
    optimistic: true
    initial_value: 1.10
    set_action:
      then:
        - lambda: |-
            id(overhead_factor) = x;

light:
  - platform: neopixelbus
    id: strip
    name: ${devicename} striscia LED
    pin: GPIO2
    num_leds: ${leds}
    type: GRB
    variant: WS2812
    method: ESP8266_UART1
    default_transition_length: 150ms
    restore_mode: RESTORE_DEFAULT_OFF

    effects:
      - addressable_rainbow:
          name: "Rainbow"
          speed: 10
          width: 32
      - addressable_scan:
          name: "Scanner"
          move_interval: 40ms
          scan_width: 5
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 5%
          progress_interval: 8ms
      - addressable_fireworks:
          name: "Fireworks"
          update_interval: 20ms
          spark_probability: 10%
          use_random_color: true
          fade_out_rate: 120
      - addressable_flicker:
          name: "Flicker"
          update_interval: 16ms
          intensity: 100%

  - platform: partition
    id: seg1
    name: ${devicename} segmento 1
    segments:
      - id: strip
        from: 0
        to: ${seg1_last}

  - platform: partition
    id: seg2
    name: ${devicename} segmento 2
    segments:
      - id: strip
        from: ${seg2_first}
        to: ${seg2_last}
