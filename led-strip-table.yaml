substitutions:
  devicename: led-strip-table
  leds: '132'

esphome:
  name: ${devicename}
  friendly_name: LED tavolo

esp8266:
  board: d1_mini_pro
  restore_from_flash: true

logger:

api:
  encryption:
    key: "506R2hevLCkdJbr+VsL9JkRoZODWtqqDn/ImUWsMQK0="

wifi:
  ssid: !secret wifi_ssid_2
  password: !secret wifi_password_2
  ap:
    ssid: ${devicename} Fallback Hotspot
    password: yK4Nia32K90Z

ota:
  - platform: esphome
    password: "e6ebd809742258a8219799efe70ec311"

captive_portal:

web_server:
  local: true
  version: 3

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    name: button_1
    icon: mdi:gesture-tap-button
    on_multi_click:
    - timing:
      - ON for at most 1s
      - OFF for at least 0.5s
      then:
        - light.turn_on:
            id: light1
            brightness: 100%
            color_mode: RGB
            red: 100%
            green: 90%
            blue: 83%
    - timing:
      - ON for at most 1s
      - OFF for at most 1s
      - ON for at most 1s
      - OFF for at least 0.2s
      then:
        - light.turn_on:
            id: light1
            brightness: 100%
            effect: Rainbow
    - timing:
      - ON for 1s to 5s
      - OFF for at least 0.5s
      then:
        - light.turn_off: light1
  - platform: gpio
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: false
    name: button_2
    icon: mdi:gesture-tap-button
    on_multi_click:
    - timing:
      - ON for at most 1s
      - OFF for at least 0.5s
      then:
        - light.turn_off: light1
    - timing:
      - ON for at most 1s
      - OFF for at most 1s
      - ON for at most 1s
      - OFF for at least 0.2s
      then:
        - light.turn_off: light1
    - timing:
      - ON for 1s to 5s
      - OFF for at least 0.5s
      then:
        - light.turn_off: light1

switch:
  - platform: gpio
    pin: GPIO12
    name: switch_1
    id: switch1

light:
  - platform: neopixelbus
    restore_mode: RESTORE_DEFAULT_ON
    variant: WS2812
    pin: D4
    num_leds: ${leds}
    type: GRB
    name: NeoPixel WS2812
    id: light1
    icon: mdi:led-strip-variant
    effects:
      - strobe:
      - flicker:
      - addressable_rainbow:
      - addressable_color_wipe:
      - addressable_scan:
      - addressable_twinkle:
      - addressable_random_twinkle:
      - addressable_fireworks:
    on_turn_on:
      - switch.turn_on: switch1
    on_turn_off:
      - switch.turn_off: switch1

text_sensor:
- platform: wifi_info
  ip_address:
    name: ${devicename} IP address
    icon: mdi:access-point-network
  ssid:
    name: ${devicename} SSID
    icon: mdi:access-point-network
  bssid:
    name: ${devicename} BSSID
    icon: mdi:access-point-network
  mac_address:
    name: ${devicename} MAC address
    icon: mdi:chip

sensor:
- platform: wifi_signal
  name: ${devicename} WiFi Signal
  id: wifi_signal_db
  entity_category: diagnostic
  device_class: signal_strength
  icon: mdi:wifi
  update_interval: 60s
- platform: uptime
  name: ${devicename} Uptime
  icon: mdi:clock
  device_class: duration
  update_interval: 60s