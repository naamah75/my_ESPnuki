web_server:
  local: true
  version: 3

globals:
  - id: auto_relay_control
    type: bool
    restore_value: yes
    initial_value: "true"
  - id: relay_timer
    type: int
    restore_value: no
    initial_value: "0"
  - id: relay_lock
    type: bool
    restore_value: no
    initial_value: "false"
  - id: max_relay_time
    type: int
    restore_value: no
    initial_value: ${max_relay_on_time}
  - id: interlock_seconds
    type: int
    restore_value: no
    initial_value: ${interlock_time}
  - id: ble_client_connected
    type: bool
    restore_value: no
    initial_value: "false"
  - id: ble_challenge
    type: std::string
    restore_value: no
    initial_value: '"CONNECT-FIRST"'
  - id: ble_expected_response
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: ble_challenge_issued_at_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: ble_failed_attempts
    type: int
    restore_value: no
    initial_value: "0"
  - id: ble_lockout_until_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: ble_auth_ok
    type: bool
    restore_value: no
    initial_value: "false"
  - id: ble_status_text
    type: std::string
    restore_value: no
    initial_value: '"IDLE"'
  - id: ble_debug_text
    type: std::string
    restore_value: no
    initial_value: '"BOOT"'

esp32_ble_server:
  on_connect:
    - lambda: |-
        id(ble_client_connected) = true;
        const uint32_t random_value = esp_random();
        char challenge[9];
        snprintf(challenge, sizeof(challenge), "%08lX", static_cast<unsigned long>(random_value));
        id(ble_challenge) = std::string(challenge);
        id(ble_challenge_issued_at_ms) = millis();

        uint32_t hash = 2166136261UL;
        const std::string payload = id(ble_challenge) + ":" + std::string("${ble_shared_secret}");
        for (const auto ch : payload) {
          hash ^= static_cast<uint8_t>(ch);
          hash *= 16777619UL;
        }

        char response[9];
        snprintf(response, sizeof(response), "%08lX", static_cast<unsigned long>(hash));
        id(ble_expected_response) = std::string(response);
        id(ble_failed_attempts) = 0;
        id(ble_auth_ok) = false;
        id(ble_status_text) = std::string("CHALLENGE_READY");
        id(ble_debug_text) = std::string("attempts=0 challenge_age_s=0");
        ESP_LOGI("BLE", "Client connesso: %d", id);
  on_disconnect:
    - lambda: |-
        id(ble_client_connected) = false;
        id(ble_status_text) = std::string("IDLE");
        id(ble_debug_text) = std::string("DISCONNECTED");
        ESP_LOGI("BLE", "Client disconnesso: %d", id);
  services:
    - uuid: 19b10000-e8f2-537e-4f6c-d104768a1214
      advertise: true
      characteristics:
        - id: ble_challenge_characteristic
          uuid: 19b10001-e8f2-537e-4f6c-d104768a1214
          description: "Door challenge"
          read: true
          value:
            data: !lambda |-
              return std::vector<uint8_t>(id(ble_challenge).begin(), id(ble_challenge).end());
        - id: ble_response_characteristic
          uuid: 19b10002-e8f2-537e-4f6c-d104768a1214
          description: "Door response"
          write: true
          value: "WRITE-ONLY"
          on_write:
            then:
              - lambda: |-
                  const std::string command(x.begin(), x.end());
                  const uint32_t now = millis();
                  id(ble_auth_ok) = false;

                  if (now < id(ble_lockout_until_ms)) {
                    const uint32_t remaining_ms = id(ble_lockout_until_ms) - now;
                    id(ble_status_text) = std::string("LOCKED");
                    id(ble_debug_text) = std::string("attempts=") + to_string(id(ble_failed_attempts))
                                       + " lockout_s=" + to_string(static_cast<int>(remaining_ms / 1000UL));
                    ESP_LOGW("BLE", "Tentativo durante lockout");
                    return;
                  }

                  if ((now - id(ble_challenge_issued_at_ms)) > (${ble_challenge_timeout_s} * 1000UL)) {
                    id(ble_failed_attempts) = 0;
                    id(ble_status_text) = std::string("TIMEOUT");
                    id(ble_debug_text) = std::string("attempts=0 challenge_expired=1");
                    ESP_LOGW("BLE", "Challenge scaduta");
                    return;
                  }

                  if (command == id(ble_expected_response)) {
                    id(ble_failed_attempts) = 0;
                    id(ble_auth_ok) = true;
                    id(ble_status_text) = std::string("OK");
                    id(ble_debug_text) = std::string("attempts=0 auth=ok");
                    ESP_LOGI("BLE", "Risposta BLE valida");
                  } else {
                    id(ble_failed_attempts) += 1;
                    if (id(ble_failed_attempts) >= 3) {
                      id(ble_lockout_until_ms) = now + 30000UL;
                      id(ble_status_text) = std::string("LOCKED");
                      id(ble_debug_text) = std::string("attempts=") + to_string(id(ble_failed_attempts)) + " lockout_s=30";
                      ESP_LOGW("BLE", "Troppi tentativi errati, lockout attivo");
                    } else {
                      id(ble_status_text) = std::string("ERR");
                      id(ble_debug_text) = std::string("attempts=") + to_string(id(ble_failed_attempts)) + " auth=err";
                      ESP_LOGW("BLE", "Risposta BLE non valida");
                    }
                  }
              - if:
                  condition:
                    lambda: 'return id(ble_auth_ok);'
                  then:
                    - script.execute: activate_relay
                    - lambda: |-
                        const uint32_t random_value = esp_random();
                        char challenge[9];
                        snprintf(challenge, sizeof(challenge), "%08lX", static_cast<unsigned long>(random_value));
                        id(ble_challenge) = std::string(challenge);
                        id(ble_challenge_issued_at_ms) = millis();

                        uint32_t hash = 2166136261UL;
                        const std::string payload = id(ble_challenge) + ":" + std::string("${ble_shared_secret}");
                        for (const auto ch : payload) {
                          hash ^= static_cast<uint8_t>(ch);
                          hash *= 16777619UL;
                        }

                        char response[9];
                        snprintf(response, sizeof(response), "%08lX", static_cast<unsigned long>(hash));
                        id(ble_expected_response) = std::string(response);
                        id(ble_auth_ok) = false;
                        id(ble_status_text) = std::string("CHALLENGE_READY");
                        id(ble_debug_text) = std::string("attempts=0 challenge_age_s=0");
                  else:
                    - lambda: |-
                        const uint32_t random_value = esp_random();
                        char challenge[9];
                        snprintf(challenge, sizeof(challenge), "%08lX", static_cast<unsigned long>(random_value));
                        id(ble_challenge) = std::string(challenge);
                        id(ble_challenge_issued_at_ms) = millis();

                        uint32_t hash = 2166136261UL;
                        const std::string payload = id(ble_challenge) + ":" + std::string("${ble_shared_secret}");
                        for (const auto ch : payload) {
                          hash ^= static_cast<uint8_t>(ch);
                          hash *= 16777619UL;
                        }

                        char response[9];
                        snprintf(response, sizeof(response), "%08lX", static_cast<unsigned long>(hash));
                        id(ble_expected_response) = std::string(response);
                        id(ble_auth_ok) = false;
                        if (millis() < id(ble_lockout_until_ms)) {
                          id(ble_status_text) = std::string("LOCKED");
                        } else {
                          id(ble_status_text) = std::string("CHALLENGE_READY");
                        }
                        if (millis() < id(ble_lockout_until_ms)) {
                          const uint32_t remaining_ms = id(ble_lockout_until_ms) - millis();
                          id(ble_debug_text) = std::string("attempts=") + to_string(id(ble_failed_attempts))
                                             + " lockout_s=" + to_string(static_cast<int>(remaining_ms / 1000UL));
                        } else {
                          id(ble_debug_text) = std::string("attempts=") + to_string(id(ble_failed_attempts)) + " challenge_age_s=0";
                        }
        - id: ble_status_characteristic
          uuid: 19b10003-e8f2-537e-4f6c-d104768a1214
          description: "Door status"
          read: true
          value:
            data: !lambda |-
              return std::vector<uint8_t>(id(ble_status_text).begin(), id(ble_status_text).end());
        - id: ble_debug_characteristic
          uuid: 19b10004-e8f2-537e-4f6c-d104768a1214
          description: "Door debug"
          read: true
          value:
            data: !lambda |-
              return std::vector<uint8_t>(id(ble_debug_text).begin(), id(ble_debug_text).end());
        - id: ble_snapshot_characteristic
          uuid: 19b10005-e8f2-537e-4f6c-d104768a1214
          description: "Door snapshot"
          read: true
          value:
            data: !lambda |-
              char wifi_signal_buffer[16] = "";
              if (id(wifi_signal_db).has_state()) {
                snprintf(wifi_signal_buffer, sizeof(wifi_signal_buffer), "%.0f", id(wifi_signal_db).state);
              }

              char uptime_buffer[24] = "";
              if (id(uptime_seconds).has_state()) {
                snprintf(uptime_buffer, sizeof(uptime_buffer), "%.0f", id(uptime_seconds).state);
              }

              char cpu_temp_buffer[16] = "";
              if (id(cpu_temperature).has_state()) {
                snprintf(cpu_temp_buffer, sizeof(cpu_temp_buffer), "%.1f", id(cpu_temperature).state);
              }

              std::string payload;
              payload += std::string("auto_open=") + (id(auto_relay_switch).state ? "1" : "0") + "\n";
              payload += std::string("relay_lock=") + (id(relay_lock) ? "1" : "0") + "\n";
              payload += std::string("relay_active=") + (id(relay_output).state ? "1" : "0") + "\n";
              payload += std::string("wifi_status=") + (id(wifi_status).state ? "1" : "0") + "\n";
              payload += std::string("bssid=") + id(wifi_bssid).state + "\n";
              payload += std::string("boot_time=") + id(startup_time).state + "\n";
              payload += std::string("cpu_temp_c=") + cpu_temp_buffer + "\n";
              payload += std::string("ip=") + id(wifi_ip_address).state + "\n";
              payload += std::string("mac=") + id(wifi_mac_address).state + "\n";
              payload += std::string("ssid=") + id(wifi_ssid).state + "\n";
              payload += std::string("uptime_s=") + uptime_buffer + "\n";
              payload += std::string("wifi_signal_dbm=") + wifi_signal_buffer;
              return std::vector<uint8_t>(payload.begin(), payload.end());

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Rome
    on_time_sync:
      then:
        - lambda: |-
            time_t now = id(sntp_time).now().timestamp;
            if (now > 0) {
              char buffer[30];
              strftime(buffer, sizeof(buffer), "%Y-%m-%d %H:%M:%S", localtime(&now));
              id(startup_time).publish_state(buffer);
            }
    # on_time:
    #   - seconds: 0
    #     minutes: 0
    #     hours: 3
    #     then:
    #       - logger.log: "Riavvio programmato (ore 03:00)"
    #       - switch.turn_on: restart_esp_switch

switch:
  - platform: gpio
    pin: ${pulse_gpio}
    id: relay_output
    restore_mode: ALWAYS_OFF
  - platform: template
    name: "Comando relay apertura"
    id: relay_control
    turn_on_action:
      - switch.turn_on: relay_output
      - delay: ${default_pulse_time}
      - switch.turn_off: relay_output
  - platform: template
    name: "Automazione apertura"
    id: auto_relay_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: |-
          id(auto_relay_control) = true;
    turn_off_action:
      - lambda: |-
          id(auto_relay_control) = false;
    entity_category: config
  - platform: restart
    name: ${devicename} Restart
    device_class: switch
    entity_category: diagnostic  

script:
  - id: activate_relay
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(relay_lock);'
          then:
            - lambda: |-
                ESP_LOGI("DEBUG", "Relay Attivato!");
                id(relay_lock) = true;
            - switch.turn_on: relay_output
            - delay: 1.5s
            - switch.turn_off: relay_output
            - lambda: |-
                ESP_LOGI("DEBUG", "Relay Disattivato!");
          else:
            - lambda: 'ESP_LOGW("RELAY", "Relay in interblocco. Ignorata attivazione.");'

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: "return id(ble_client_connected);"
          then:
            - lambda: |-
                const uint32_t now = millis();
                if (now < id(ble_lockout_until_ms)) {
                  const uint32_t remaining_ms = id(ble_lockout_until_ms) - now;
                  id(ble_debug_text) = std::string("attempts=") + to_string(id(ble_failed_attempts))
                                     + " lockout_s=" + to_string(static_cast<int>(remaining_ms / 1000UL));
                } else {
                  const uint32_t age_s = (now - id(ble_challenge_issued_at_ms)) / 1000UL;
                  id(ble_debug_text) = std::string("attempts=") + to_string(id(ble_failed_attempts))
                                     + " challenge_age_s=" + to_string(static_cast<int>(age_s));
                }
      - if:
          condition:
            switch.is_on: relay_output
          then:
            - lambda: |-
                id(relay_timer) += 1;
                ESP_LOGD("SAFETY", "Relay attivo da %d secondi", id(relay_timer));
      - if:
          condition:
            lambda: "return id(relay_timer) >= id(max_relay_time);"
          then:
            - lambda: |-
                ESP_LOGW("SAFETY", "Tempo massimo superato, spengo relay.");
            - switch.turn_off: relay_output
            - lambda: |-
                id(relay_timer) = 0;
      - if:
          condition:
            lambda: "return id(ble_client_connected);"
          then:
            - light.turn_on:
                id: status_led
                red: 0.6
                green: 0.0
                blue: 1.0
          else:
            - if:
                condition:
                  switch.is_on: relay_output
                then:
                  - light.turn_on:
                      id: status_led
                      red: 1.0
                      green: 1.0
                      blue: 0.0
                else:
                  - if:
                      condition:
                        binary_sensor.is_on: wifi_status
                      then:
                        - light.turn_on:
                            id: status_led
                            red: 0.0
                            green: 1.0
                            blue: 0.0
                      else:
                        - light.turn_on:
                            id: status_led
                            red: 1.0
                            green: 0.0
                            blue: 0.0

  - interval: 1s
    then:
      - if:
          condition:
            lambda: "return id(relay_lock);"
          then:
            - lambda: |-
                static int interlock_countdown = ${interlock_time};
                interlock_countdown--;
                if (interlock_countdown <= 0) {
                  id(relay_lock) = false;
                  interlock_countdown = ${interlock_time};
                  ESP_LOGI("RELAY", "Interblocco terminato.");
                }
  # - interval: 6h
  #   then:
  #     - logger.log: "Riavvio programmato per mantenere stabile il BLE"
  #     - switch.turn_on: restart_esp_switch

binary_sensor:
  - platform: template
    name: ${devicename} Relay Lock
    id: relay_lock_sensor
    lambda: "return id(relay_lock);"
    icon: mdi:lock-clock
    entity_category: diagnostic
  - platform: status
    name: ${devicename} WiFi Status
    id: wifi_status
    internal: true
    update_interval: 1s
    entity_category: diagnostic        

sensor:
  - platform: wifi_signal
    name: ${devicename} WiFi Signal
    id: wifi_signal_db
    update_interval: 60s
    device_class: signal_strength
    entity_category: diagnostic
  - platform: uptime
    name: ${devicename} Uptime
    id: uptime_seconds
    icon: mdi:clock
    device_class: duration
    update_interval: 60s
  - platform: internal_temperature
    name: ${devicename} CPU temperature
    id: cpu_temperature
    update_interval: 60s
    device_class: temperature
    entity_category: diagnostic
  # - platform: uptime
  #   name: "ESP32-S3 tempo di lavoro"
  #   id: esp_uptime
  #   update_interval: 60s
  #   device_class: duration

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ${devicename} IP address
      id: wifi_ip_address
      icon: mdi:access-point-network
    ssid:
      name: ${devicename} SSID
      id: wifi_ssid
      icon: mdi:access-point-network
    bssid:
      name: ${devicename} BSSID
      id: wifi_bssid
      icon: mdi:access-point-network
    mac_address:
      name: ${devicename} MAC address
      id: wifi_mac_address
      icon: mdi:chip
  - platform: template
    name: ${devicename} Boot time
    id: startup_time
    update_interval: never
    icon: mdi:calendar-month
    entity_category: diagnostic
    lambda: |-
      time_t now = id(sntp_time).now().timestamp;
      char buffer[30];
      strftime(buffer, sizeof(buffer), "%Y-%m-%d %H:%M:%S", localtime(&now));
      return std::string(buffer);

light:
  - platform: neopixelbus
    variant: ws2812x
    type: GRB
    pin: ${status_led_gpio}
    num_leds: 1
    id: status_led
    restore_mode: ALWAYS_OFF
